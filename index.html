<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>José Armando</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#000;
  --card:rgba(255,255,255,0.04);
  --text:#fff;
  --sub:#9ca3af;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background: radial-gradient(circle at top,#000,#020617);
  color:var(--text);
}

.container{max-width:420px;margin:auto;padding:16px}
.hero{min-height:75vh;display:flex;align-items:center;justify-content:center}

.card{
  background:var(--card);
  backdrop-filter:blur(20px);
  border-radius:22px;
  padding:26px;
  box-shadow:0 30px 80px rgba(0,0,0,.8);
  text-align:center;
  animation:fadeUp .6s ease;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

.profile{
  width:80px;height:80px;border-radius:50%;
  margin-bottom:16px;
  object-fit:cover;
  border:1px solid rgba(255,255,255,.1);
}

h1{font-size:26px;font-weight:600}
.subtitle{color:var(--sub);font-size:14px;margin-top:4px}
.tagline{margin-top:14px;font-size:15px;line-height:1.5}

.buttons{margin-top:20px;display:flex;flex-direction:column;gap:10px}

.btn{
  padding:14px;
  border-radius:12px;
  font-size:14px;
  border:none;
  cursor:pointer;
  transition:.2s;
}

.btn-primary{
  background:#111827;
  color:white;
  border:1px solid rgba(255,255,255,.1);
}

.btn-secondary{
  background:rgba(255,255,255,.05);
  color:#d4d4d8;
}

.btn:active{transform:scale(.96)}

.section{margin-top:18px}

.links{display:flex;flex-direction:column;gap:10px;margin-top:16px}

.link{
  text-decoration:none;
  color:white;
  padding:14px;
  border-radius:12px;
  background:rgba(255,255,255,.05);
  text-align:center;
}

/* MODAL PRO */
#cvModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
backdrop-filter: blur(12px);
display:none;
justify-content:center;
align-items:center;
z-index:999;
animation:fadeIn .25s ease;
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

.cv-container{
width:92%;
max-width:420px;
height:85%;
background:rgba(20,20,20,0.95);
border-radius:20px;
overflow:hidden;
box-shadow:0 30px 80px rgba(0,0,0,0.8);
position:relative;
animation:scaleIn .25s ease;
}

@keyframes scaleIn{
from{transform:scale(.9);opacity:0}
to{transform:scale(1);opacity:1}
}

.cv-frame{
width:100%;
height:100%;
border:none;
}

.close-btn{
position:absolute;
top:10px;
right:10px;
z-index:10;
background:rgba(255,255,255,0.1);
backdrop-filter: blur(10px);
color:white;
border:none;
padding:8px 10px;
border-radius:10px;
}

</style>
</head>

<body>

<section class="hero">
<div class="container">
<div class="card">

<img src="profile.PNG" class="profile">

<h1>José Armando</h1>
<div class="subtitle">Supply Chain & Operations Consultant</div>

<p class="tagline">
Optimizo operaciones y reduzco costos en semanas, no meses.
</p>

<div class="buttons">
<a href="cv.pdf" download class="btn btn-primary">Descargar CV</a>
<button class="btn btn-secondary" onclick="openCV()">Ver CV</button>
</div>

</div>
</div>
</section>

<section class="container section">
<div class="links">
<a class="link" href="https://linkedin.com/in/TU-LINK">LinkedIn</a>
<a class="link" href="https://wa.me/521XXXXXXXXXX?text=Hola%20José,%20quiero%20optimizar%20mi%20operación">WhatsApp</a>
<button class="link" onclick="downloadVCF()">Guardar contacto</button>
</div>
</section>

<!-- MODAL CV -->
<div id="cvModal">
  <div class="cv-container">
    <button class="close-btn" onclick="closeCV()">Cerrar</button>
    <iframe src="cv.pdf" class="cv-frame"></iframe>
  </div>
</div>

<script>

// abrir modal
function openCV(){
  document.getElementById('cvModal').style.display='flex';
  document.body.style.overflow='hidden';
  trackCV();
}

// cerrar modal
function closeCV(){
  document.getElementById('cvModal').style.display='none';
  document.body.style.overflow='auto';
}

// swipe cerrar
let touchStartX=0;

document.addEventListener('touchstart', e=>{
  touchStartX=e.touches[0].clientX;
});

document.addEventListener('touchmove', e=>{
  let diff=touchStartX - e.touches[0].clientX;
  if(diff>80){
    closeCV();
  }
});

// tracking simple
function trackCV(){
  let count=localStorage.getItem('cvViews')||0;
  count++;
  localStorage.setItem('cvViews',count);
  console.log('CV abierto:',count);
}

// vcf
function downloadVCF(){
const vcf=`BEGIN:VCARD
VERSION:3.0
FN:José Armando
TITLE:Supply Chain & Operations Consultant
TEL:+521XXXXXXXXXX
EMAIL:correo@ejemplo.com
END:VCARD`;

const blob=new Blob([vcf],{type:'text/vcard'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');
a.href=url;
a.download='contacto.vcf';
a.click();
}

</script>

</body>
</html>
